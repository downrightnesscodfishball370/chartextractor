name: Feature request
description: Suggest an idea to improve ChartExtractor.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user pain point or limitation does this address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred approach.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other ideas or workarounds you've considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, sketches, or sample charts that help explain the request.
